name: Build & Release ANA Windows EXE

on:
  push:
    tags:
      - "v*"          # triggers on  git tag v1.0.0  &&  git push --tags
  workflow_dispatch:  # also allows manual "Run workflow" from GitHub UI

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build ANA.exe
        run: |
          pyinstaller `
            --onefile `
            --name ANA `
            --add-data "mini_100_neuron_agent.py;." `
            --add-data "core_infra.py;." `
            --add-data "neural_engine.py;." `
            ana_launcher.py

      - name: Zip the EXE
        run: Compress-Archive -Path dist\ANA.exe -DestinationPath ANA_windows.zip

      - name: Upload artifact (always kept for 30 days)
        uses: actions/upload-artifact@v4
        with:
          name: ANA_windows
          path: ANA_windows.zip
          retention-days: 30

      - name: Create GitHub Release & attach ZIP
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "COCOA Bot ${{ github.ref_name }}"
          body: |
            ## 🍫 COCOA Bot — ANA ${{ github.ref_name }}

            ### Download
            Download **ANA_windows.zip**, unzip it, and double-click `ANA.exe`.
            No Python installation required.

            ### What's inside
            - `ANA.exe` — self-contained Windows executable
            - Opens the COCOA web UI at `http://localhost:5000` automatically

            > Built from commit ${{ github.sha }}
          files: ANA_windows.zip
          draft: false
          prerelease: false
